[pytest]
testpaths =
    Tests/backend/unit
    Tests/backend/integration/routes
    Tests/backend/integration/test_file_library_e2e.py
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning:starlette\.formparsers
markers =
    r: requires a working R installation and scientific packages
    live: starts isolated application services and runs full scientific workflows
    performance: validates representative-data performance or resource bounds
    slow: takes materially longer than the hermetic PR suite
