repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: npm --prefix frontend run lint
        pass_filenames: false
        files: ^frontend/src/.*\.[jt]sx?$
        require_serial: true

      - id: tsc
        name: typescript type-check
        language: system
        entry: npm --prefix frontend run typecheck
        pass_filenames: false
        files: ^frontend/src/.*\.[jt]sx?$
        require_serial: true

      - id: pytest
        name: backend unit tests
        language: system
        entry: backend/.venv/Scripts/python.exe -m pytest Tests/backend/unit -q --tb=short
        pass_filenames: false
        files: ^backend/.*\.py$
        require_serial: true
