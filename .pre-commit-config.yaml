repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: npm --prefix frontend run lint
        pass_filenames: false
        files: ^frontend/src/.*\.[jt]sx?$
        require_serial: true

      - id: tsc
        name: typescript type-check
        language: system
        entry: npm --prefix frontend run typecheck
        pass_filenames: false
        files: ^frontend/src/.*\.[jt]sx?$
        require_serial: true

      - id: pytest
        name: backend smoke tests
        language: system
        # Smoke tests target fast, self-contained modules (infra, models, utils) plus a
        # subset of services that run in <1s.  New test modules must be added here
        # explicitly — full suites are exercised in CI.
        entry: python -m pytest Tests/backend/unit/infrastructure/ Tests/backend/unit/models/ Tests/backend/unit/utils/ Tests/backend/unit/services/test_file_index_service.py Tests/backend/unit/services/test_report_store.py -q --tb=short --no-header
        pass_filenames: false
        files: ^backend/.*\.py$
        require_serial: true
