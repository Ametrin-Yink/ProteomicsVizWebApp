name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint & unit tests ──────────────────────────────────────────

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest Tests/backend/unit -v --tb=short
        working-directory: .

  # ── Frontend: lint & type check ────────────────────────────────────────

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

  # ── E2E: Playwright (requires running backend + frontend) ──────────────

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      # No Docker services needed — servers run directly in steps below.
      # Defined here as a placeholder for future services (e.g. database).

    steps:
      - uses: actions/checkout@v4

      # --- Backend setup ---

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: backend

      # Basic R runtime so the config default "Rscript" resolves.
      # E2E wizard UI tests don't need Bioconductor packages.
      # If you add E2E tests that run the pipeline, install them here:
      #   sudo apt-get install -y r-base
      #   sudo Rscript -e 'install.packages(c("BiocManager"))'
      #   sudo Rscript -e 'BiocManager::install(c("msqrob2","QFeatures","limma","MSstats"))'
      - name: Install R (runtime only)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends r-base

      - name: Start backend
        run: |
          cd backend
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # Wait until the backend responds
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/api/organisms > /dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start" && exit 1

      # --- Frontend setup ---

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install E2E dependencies
        run: npm ci
        working-directory: Tests

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright/
          key: playwright-${{ runner.os }}-${{ hashFiles('Tests/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: Tests
        # --with-deps installs system libs (fast if already present).
        # The browser binary is restored from cache above, so the
        # download is skipped on cache hits.

      - name: Start frontend
        run: |
          cd frontend
          npm run dev -- -p 3000 &
          # Wait until the frontend responds
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200\|302\|304"; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start" && exit 1
        env:
          CI: true

      # --- Run E2E tests ---

      - name: Run Playwright tests
        id: e2e
        run: npx playwright test
        working-directory: Tests
        env:
          CI: true

      # --- Artifacts on failure ---

      - name: Upload test artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            Tests/test-results/
            Tests/playwright-report/
            Tests/screenshots/
          retention-days: 7
