name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint & unit tests ──────────────────────────────────────────

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest — unit)
        run: pytest Tests/backend/unit -v --tb=short
        working-directory: .

      - name: Tests (pytest — integration routes)
        run: pytest Tests/backend/integration/routes -v --tb=short
        working-directory: .

      - name: Tests (pytest — integration pipeline, skip if no R)
        run: pytest Tests/backend/integration/pipeline -v --tb=short --ignore-glob="*e2e*" || true
        working-directory: .

  # ── Frontend: lint & type check ────────────────────────────────────────

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

