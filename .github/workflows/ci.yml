name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: ruff check backend Tests

      - name: Verify generated OpenAPI contract
        run: python backend/scripts/generate_openapi.py --check

      - name: Tests (pytest - unit)
        run: pytest Tests/backend/unit -v --tb=short

      - name: Tests (pytest - integration API)
        run: >-
          pytest Tests/backend/integration/routes
          Tests/backend/integration/test_file_library_e2e.py
          -v --tb=short

  frontend:
    name: Frontend and browser contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies for real-stack browser test
        run: pip install -r ../backend/requirements.txt

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Tests (Vitest)
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install browser for critical journeys
        run: npx playwright install --with-deps chromium

      - name: Browser critical journeys
        run: npm run test:e2e
