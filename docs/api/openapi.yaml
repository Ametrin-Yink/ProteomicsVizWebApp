openapi: 3.0.0
info:
  title: Proteomics Visualization Web App API
  version: 1.0.0
  description: API for proteomics data analysis and visualization

servers:
  - url: http://localhost:8000/api
    description: Development server

paths:
  /sessions:
    post:
      summary: Create a new session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreate'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
    get:
      summary: List all sessions
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'

  /sessions/{sessionId}:
    get:
      summary: Get session details
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
    delete:
      summary: Delete a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session deleted

  /sessions/{sessionId}/upload/proteomics:
    post:
      summary: Upload proteomics files
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Files uploaded

  /sessions/{sessionId}/process:
    post:
      summary: Start processing pipeline
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Processing started

  /sessions/{sessionId}/results:
    get:
      summary: Get differential expression results
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Results data

  /sessions/{sessionId}/qc/plots:
    get:
      summary: Get QC plot data
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: QC plot data

  /sessions/{sessionId}/processing/status:
    get:
      summary: Get processing status and queue position
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Processing status

  /sessions/{sessionId}/processing/logs:
    get:
      summary: Get processing logs
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Processing log entries

  /sessions/{sessionId}/processing/retry:
    post:
      summary: Retry failed pipeline step
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Retry started

  /sessions/{sessionId}/gsea/{database}:
    get:
      summary: Get GSEA results
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: database
          in: path
          required: true
          schema:
            type: string
            enum: [go_bp, go_mf, go_cc, kegg, reactome]
      responses:
        '200':
          description: GSEA results

  /sessions/{sessionId}/gsea/run:
    post:
      summary: Run GSEA on-demand for a comparison
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comparison:
                  type: string
                databases:
                  type: array
                  items:
                    type: string
      responses:
        '202':
          description: GSEA started

  /sessions/{sessionId}/compare/protein:
    post:
      summary: Protein correlation analysis (PCA, UMAP, t-SNE)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Analysis started

  /sessions/{sessionId}/compare/matrix:
    post:
      summary: Similarity matrix clustering
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Analysis started

  /sessions/{sessionId}/compare/status:
    get:
      summary: Get compare task status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task status

  /sessions/{sessionId}/compare/result:
    get:
      summary: Get compare task result
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task result

  /organisms:
    get:
      summary: List supported organisms
      responses:
        '200':
          description: List of organisms

components:
  schemas:
    SessionCreate:
      type: object
      required:
        - name
        - template
      properties:
        name:
          type: string
        template:
          type: string
        pipeline:
          type: string
          enum: [msqrob2, msstats]
          default: msqrob2

    Session:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        template:
          type: string
        pipeline:
          type: string
          enum: [msqrob2, msstats]
        state:
          type: string
          enum: [created, configuring, queued, processing, completed, error, cancelled]
        config:
          $ref: '#/components/schemas/SessionConfig'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SessionConfig:
      type: object
      properties:
        treatment:
          type: string
        control:
          type: string
        organism:
          type: string
        remove_razor:
          type: boolean
        strict_filtering:
          type: boolean
        comparisons:
          type: array
          items:
            type: object
            properties:
              group1:
                type: object
              group2:
                type: object
        msqrob2_normalization:
          type: string
        msstats_normalization:
          type: string
