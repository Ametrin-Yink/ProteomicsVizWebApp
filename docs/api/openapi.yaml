openapi: 3.1.0
info:
  title: Proteomics Visualization API
  description: Proteomics Visualization Web App API
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health Check
      description: Health check endpoint - responds immediately even if sessions aren't loaded.
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /{path}:
    options:
      summary: Handle Cors Preflight
      description: Handle CORS preflight requests explicitly.
      operationId: handle_cors_preflight__path__options
      parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
          title: Path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/status:
    get:
      tags:
      - processing
      summary: Get Processing Status
      description: Get detailed processing status.
      operationId: get_processing_status_api_sessions__session_id__status_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingStatus'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/logs:
    get:
      tags:
      - processing
      summary: Get Processing Logs
      description: 'Get processing logs and pipeline state for a session.


        Returns historical logs, completed steps, and completion status.

        Used by frontend when connecting to an already-running or completed session.'
      operationId: get_processing_logs_api_sessions__session_id__logs_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/retry:
    post:
      tags:
      - processing
      summary: Retry Processing
      description: Retry failed processing. Routes through the same semaphore/queue logic as start_processing.
      operationId: retry_processing_api_sessions__session_id__retry_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/process:
    post:
      tags:
      - processing
      summary: Start Processing
      description: "Start the processing pipeline for a session.\n\nArgs:\n    session_id: Session ID\n\
        \    background_tasks: FastAPI background tasks\n    store: Session store dependency\n\nReturns:\n\
        \    202 Accepted with WebSocket URL\n\nRaises:\n    HTTPException: 404 if session not found,\
        \ 400 if validation fails, 409 if already processing"
      operationId: start_processing_api_sessions__session_id__process_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/cancel:
    post:
      tags:
      - processing
      summary: Cancel Processing
      description: Cancel processing or remove session from queue.
      operationId: cancel_processing_api_sessions__session_id__cancel_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/upload/proteomics:
    post:
      tags:
      - upload
      summary: Upload Proteomics Files
      description: Upload proteomics PD export files (.csv or .txt, TMT or DIA).
      operationId: upload_proteomics_files_api_sessions__session_id__upload_proteomics_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_proteomics_files_api_sessions__session_id__upload_proteomics_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/upload/ptm-enrichment:
    post:
      tags:
      - upload
      summary: Upload Ptm Enrichment Files
      description: Upload PTM enrichment CSV files.
      operationId: upload_ptm_enrichment_files_api_sessions__session_id__upload_ptm_enrichment_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_ptm_enrichment_files_api_sessions__session_id__upload_ptm_enrichment_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/upload/global-proteome:
    post:
      tags:
      - upload
      summary: Upload Global Proteome Files
      description: Upload global proteome CSV files.
      operationId: upload_global_proteome_files_api_sessions__session_id__upload_global_proteome_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_global_proteome_files_api_sessions__session_id__upload_global_proteome_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/upload/fasta:
    post:
      tags:
      - upload
      summary: Upload Fasta File
      description: Upload a single FASTA file.
      operationId: upload_fasta_file_api_sessions__session_id__upload_fasta_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_fasta_file_api_sessions__session_id__upload_fasta_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/files/{file_type}/{filename}:
    delete:
      tags:
      - upload
      summary: Delete File
      description: Delete a file from a session.
      operationId: delete_file_api_sessions__session_id__files__file_type___filename__delete
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: file_type
        in: path
        required: true
        schema:
          type: string
          title: File Type
      - name: filename
        in: path
        required: true
        schema:
          type: string
          title: Filename
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/results:
    get:
      tags:
      - visualization
      summary: Get Results
      description: Get differential expression results with pagination and filtering.
      operationId: get_results_api_sessions__session_id__results_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 20000
          minimum: 1
          default: 50
          title: Page Size
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          default: adj_pvalue
          title: Sort By
      - name: sort_order
        in: query
        required: false
        schema:
          type: string
          default: asc
          title: Sort Order
      - name: significant_only
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Significant Only
      - name: search
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Search
      - name: comparison
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Comparison
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/qc/plots:
    get:
      tags:
      - visualization
      summary: Get Qc Plots
      description: Get QC plot data.
      operationId: get_qc_plots_api_sessions__session_id__qc_plots_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: comparison
        in: query
        required: false
        schema:
          type: string
          description: Comparison label for per-comparison p-value distribution
          default: ''
          title: Comparison
        description: Comparison label for per-comparison p-value distribution
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/gsea/{database}/plot:
    get:
      tags:
      - visualization
      summary: Get Gsea Plot Data
      description: Get GSEA plot data (running ES curve + rank metric positions) for a specific pathway.
      operationId: get_gsea_plot_data_api_sessions__session_id__gsea__database__plot_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: database
        in: path
        required: true
        schema:
          type: string
          title: Database
      - name: term
        in: query
        required: true
        schema:
          type: string
          description: Pathway term identifier
          title: Term
        description: Pathway term identifier
      - name: comparison
        in: query
        required: false
        schema:
          type: string
          description: Comparison name (for multi-condition)
          default: ''
          title: Comparison
        description: Comparison name (for multi-condition)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/gsea/{database}/heatmap:
    get:
      tags:
      - visualization
      summary: Get Gsea Heatmap Data
      description: Get GSEA heatmap data (z-scores for leading edge genes) for a specific pathway.
      operationId: get_gsea_heatmap_data_api_sessions__session_id__gsea__database__heatmap_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: database
        in: path
        required: true
        schema:
          type: string
          title: Database
      - name: term
        in: query
        required: true
        schema:
          type: string
          description: Pathway term identifier
          title: Term
        description: Pathway term identifier
      - name: comparison
        in: query
        required: false
        schema:
          type: string
          description: Comparison name (for multi-condition)
          default: ''
          title: Comparison
        description: Comparison name (for multi-condition)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/gsea/status:
    get:
      tags:
      - visualization
      summary: Get Gsea Run Status
      operationId: get_gsea_run_status_api_sessions__session_id__gsea_status_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/tasks:
    get:
      tags:
      - visualization
      summary: Get Session Tasks
      description: 'Return all task states for a session.


        Merges in-memory TaskManager state with on-disk status files so the

        TaskStatusBar sees on-demand tasks (GSEA, BIONET, compare) immediately

        after they are triggered — before the background coroutine calls

        task_manager.submit() — and after they complete and are removed from

        the in-memory _active_tasks dict.'
      operationId: get_session_tasks_api_sessions__session_id__tasks_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/tasks/cancel:
    post:
      tags:
      - visualization
      summary: Cancel Session Tasks
      description: Cancel all running and queued tasks for a session.
      operationId: cancel_session_tasks_api_sessions__session_id__tasks_cancel_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/gsea/run:
    post:
      tags:
      - visualization
      summary: Run Gsea On Demand
      operationId: run_gsea_on_demand_api_sessions__session_id__gsea_run_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GseaRunRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/gsea/{database}:
    get:
      tags:
      - visualization
      summary: Get Gsea Results
      description: Get GSEA results for a database with pagination and filtering.
      operationId: get_gsea_results_api_sessions__session_id__gsea__database__get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: database
        in: path
        required: true
        schema:
          type: string
          title: Database
      - name: comparison
        in: query
        required: false
        schema:
          type: string
          description: Comparison label for multi-condition
          default: ''
          title: Comparison
        description: Comparison label for multi-condition
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 50
          title: Page Size
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          default: nes
          title: Sort By
      - name: sort_order
        in: query
        required: false
        schema:
          type: string
          default: desc
          title: Sort Order
      - name: significant_only
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Significant Only
      - name: search
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Search
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/bionet/run:
    post:
      tags:
      - visualization
      summary: Run Bionet On Demand
      operationId: run_bionet_on_demand_api_sessions__session_id__bionet_run_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BioNetRunRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/bionet/status:
    get:
      tags:
      - visualization
      summary: Get Bionet Run Status
      operationId: get_bionet_run_status_api_sessions__session_id__bionet_status_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/bionet/subnetwork:
    get:
      tags:
      - visualization
      summary: Get Bionet Subnetwork
      operationId: get_bionet_subnetwork_api_sessions__session_id__bionet_subnetwork_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/protein/{protein_id}/abundance:
    get:
      tags:
      - visualization
      summary: Get Protein Abundance
      description: Get protein abundance data, optionally filtered by comparison.
      operationId: get_protein_abundance_api_sessions__session_id__protein__protein_id__abundance_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: protein_id
        in: path
        required: true
        schema:
          type: string
          title: Protein Id
      - name: comparison
        in: query
        required: false
        schema:
          type: string
          description: Comparison name to filter samples
          default: ''
          title: Comparison
        description: Comparison name to filter samples
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/protein/{protein_id}/peptide:
    get:
      tags:
      - visualization
      summary: Get Protein Peptide
      description: Get peptide abundance data for a protein, optionally filtered by comparison.
      operationId: get_protein_peptide_api_sessions__session_id__protein__protein_id__peptide_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: protein_id
        in: path
        required: true
        schema:
          type: string
          title: Protein Id
      - name: comparison
        in: query
        required: false
        schema:
          type: string
          description: Comparison name to filter samples
          default: ''
          title: Comparison
        description: Comparison name to filter samples
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/ptm/results:
    get:
      tags:
      - visualization
      summary: Get Ptm Results
      description: 'Get PTM differential expression results with three-model output.


        Returns grouped data for each comparison label, containing the PTM model,

        protein model, and adjusted model results where available.

        Mode A comparisons only have the PTM model; Mode B has all three.'
      operationId: get_ptm_results_api_sessions__session_id__ptm_results_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/ptm/site/{site_id}/abundance:
    get:
      tags:
      - visualization
      summary: Get Ptm Site Abundance
      description: 'Get per-site PTM abundance data across conditions.


        Currently returns a placeholder -- full data will be available after

        the PTM pipeline completes.'
      operationId: get_ptm_site_abundance_api_sessions__session_id__ptm_site__site_id__abundance_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: site_id
        in: path
        required: true
        schema:
          type: string
          title: Site Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/ptm/qc/plots:
    get:
      tags:
      - visualization
      summary: Get Ptm Qc Plots
      description: Get PTM-specific QC data.
      operationId: get_ptm_qc_plots_api_sessions__session_id__ptm_qc_plots_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
